name: Release

on:
  push:
    tags:
      # Semantic version tags, e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  container-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Registers binfmt handlers so Podman can cross-build linux/arm64
      - uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        run: >
          podman login docker.io
          --username "${{ secrets.DOCKER_HUB_USERNAME }}"
          --password "${{ secrets.DOCKER_HUB_TOKEN }}"

      - name: Build multi-arch image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          podman build \
            --platform linux/amd64,linux/arm64 \
            --manifest "docker.io/pfeiffermax/file-manager:${VERSION}" \
            -f Containerfile .

      - name: Push version and latest tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          podman manifest push --all \
            "docker.io/pfeiffermax/file-manager:${VERSION}" \
            "docker://docker.io/pfeiffermax/file-manager:${VERSION}"
          podman manifest push --all \
            "docker.io/pfeiffermax/file-manager:${VERSION}" \
            "docker://docker.io/pfeiffermax/file-manager:latest"
